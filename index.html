<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аналитика выручки — НСИТИ + ДАМУ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#e8e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#6d28d9,#ec4899);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{color:#fff;font-size:20px;font-weight:800}
.header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.container{max-width:1100px;margin:0 auto;padding:24px 16px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi{background:#1a1a2e;border-radius:14px;padding:18px;border:1px solid #2a2a4a;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.kpi.c1{--accent:#a855f7}.kpi.c2{--accent:#ec4899}.kpi.c3{--accent:#f59e0b}.kpi.c4{--accent:#22c55e}
.kpi-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:800;color:#fff}
.kpi-sub{font-size:12px;color:#6b7280;margin-top:3px}
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
.charts-grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:#1a1a2e;border-radius:14px;padding:20px;border:1px solid #2a2a4a}
.card-title{font-size:13px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 10px;background:#13132a;color:#6b7280;font-size:11px;font-weight:700;text-transform:uppercase;border-bottom:1px solid #2a2a4a}
.tbl td{padding:9px 10px;border-bottom:1px solid #1e1e38;color:#e8e8f0}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#1e1e38}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.bon{background:#2e1065;color:#c084fc}.boff{background:#500724;color:#f9a8d4}
.bns{background:#052e16;color:#86efac}.bdm{background:#431407;color:#fdba74}
.import-zone{background:#13132a;border:2px dashed #2a2a4a;border-radius:14px;padding:22px;text-align:center;margin-bottom:24px;cursor:pointer;transition:border-color .2s}
.import-zone:hover{border-color:#6d28d9}
.import-zone.drag{border-color:#ec4899;background:#1a1238}
.import-zone p{color:#6b7280;font-size:13px;margin-top:6px}
.import-zone .icon{font-size:32px;margin-bottom:6px}
.url-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.url-input{flex:1;padding:10px 14px;background:#13132a;border:1.5px solid #2a2a4a;border-radius:9px;color:#e8e8f0;font-size:13px;outline:none;font-family:inherit;min-width:200px}
.url-input:focus{border-color:#6d28d9}
.btn{padding:10px 18px;border:none;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:all .15s}
.btn-purple{background:#6d28d9;color:#fff}.btn-purple:hover{background:#5b21b6}
.btn-sm{padding:7px 13px;font-size:12px}
.period-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.ptab{padding:7px 16px;border:1.5px solid #2a2a4a;background:#13132a;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;color:#6b7280;transition:all .15s;font-family:inherit}
.ptab.active{background:#6d28d9;color:#fff;border-color:#6d28d9}
.empty{text-align:center;padding:40px;color:#4b5563}
.empty .ico{font-size:40px;margin-bottom:10px}
.empty small{font-size:12px;color:#374151;display:block;margin-top:8px}
@media(max-width:700px){.kpi-grid{grid-template-columns:1fr 1fr}.charts-grid,.charts-grid2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <h1>📊 Аналитика выручки — НСИТИ + ДАМУ</h1>
  <div class="header-right">
    <span id="lastUpdate" style="font-size:12px;color:rgba(255,255,255,.6)"></span>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff" onclick="reloadApi()">🔄 Обновить</button>
  </div>
</div>

<div class="container">

  <div style="margin-bottom:24px">
    <div class="url-row">
      <input class="url-input" id="apiUrl" placeholder="URL скрипта /exec — Google Apps Script doGet">
      <button class="btn btn-purple" onclick="loadFromApi()">🔄 Загрузить</button>
    </div>
    <div class="import-zone" id="dropZone">
      <div class="icon">📂</div>
      <strong style="color:#e8e8f0">Перетащи CSV или JSON</strong>
      <p>или нажми и выбери файл</p>
      <input type="file" id="fileInput" accept=".csv,.json" style="display:none">
    </div>
  </div>

  <div class="period-tabs">
    <button class="ptab active" onclick="setPeriod('all',this)">Всё время</button>
    <button class="ptab" onclick="setPeriod('1-10',this)">1–10</button>
    <button class="ptab" onclick="setPeriod('11-20',this)">11–20</button>
    <button class="ptab" onclick="setPeriod('21-',this)">21–конец</button>
  </div>

  <div class="kpi-grid">
    <div class="kpi c1"><div class="kpi-label">💻 Онлайн</div><div class="kpi-value" id="kpiOnline">—</div><div class="kpi-sub" id="kpiOnlineN">—</div></div>
    <div class="kpi c2"><div class="kpi-label">🏢 Офф НСИТИ</div><div class="kpi-value" id="kpiNsiti">—</div><div class="kpi-sub" id="kpiNsitiN">—</div></div>
    <div class="kpi c3"><div class="kpi-label">🏢 Офф ДАМУ</div><div class="kpi-value" id="kpiDamu">—</div><div class="kpi-sub" id="kpiDamuN">—</div></div>
    <div class="kpi c4"><div class="kpi-label">💰 Итого</div><div class="kpi-value" id="kpiTotal">—</div><div class="kpi-sub" id="kpiTotalN">—</div></div>
  </div>

  <div class="charts-grid">
    <div class="card"><div class="card-title">Выручка по дням</div><canvas id="chartDays" height="200"></canvas></div>
    <div class="card"><div class="card-title">По каналам</div><canvas id="chartChannels" height="200"></canvas></div>
  </div>

  <div class="charts-grid2">
    <div class="card"><div class="card-title">По менеджерам</div><canvas id="chartManagers" height="220"></canvas></div>
    <div class="card"><div class="card-title">Топ пакетов</div><canvas id="chartPackages" height="220"></canvas></div>
  </div>

  <div class="card">
    <div class="card-title">Все записи</div>
    <div style="overflow-x:auto">
      <div id="tableContainer">
        <div class="empty">
          <div class="ico">📭</div>
          <p>Данные ещё не загружены</p>
          <small>Введи URL скрипта выше и нажми «Загрузить»</small>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let allData = [], currentPeriod = 'all', charts = {};

// Вставь сюда актуальный URL после переразвёртывания скрипта
const AUTO_API_URL = 'https://script.google.com/macros/s/AKfycbwvV0aAuGsXodi0hxtcn18TNhQ4JRf7D7fWM2EV7dUiVK7rkB6FR-3ZBepXliDDqw_T/exec';

// ── ФАЙЛОВЫЙ ИМПОРТ (исправлен) ───────────────────────────────
document.getElementById('dropZone').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('dropZone').addEventListener('dragover', e => { e.preventDefault(); e.currentTarget.classList.add('drag'); });
document.getElementById('dropZone').addEventListener('dragleave', e => e.currentTarget.classList.remove('drag'));
document.getElementById('dropZone').addEventListener('drop', e => { e.preventDefault(); e.currentTarget.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  const fr = new FileReader();
  fr.onload = ev => {
    try {
      if (file.name.endsWith('.json')) { const d = JSON.parse(ev.target.result); loadData(d.data || d); }
      else { loadData(parseCSV(ev.target.result)); }
    } catch(err) { alert('Ошибка при чтении: ' + err.message); }
  };
  fr.readAsText(file);
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitLine(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(l => {
    const v = splitLine(l), o = {};
    headers.forEach((h, i) => o[h] = v[i] !== undefined ? v[i] : '');
    return o;
  });
}

function splitLine(line) {
  const r = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { r.push(cur.trim()); cur = ''; }
    else cur += c;
  }
  r.push(cur.trim()); return r;
}

// ── API ЗАГРУЗКА ──────────────────────────────────────────────
async function loadFromApi() {
  const url = document.getElementById('apiUrl').value.trim();
  if (!url) { alert('Введи URL скрипта'); return; }
  setStatus('Загрузка…');
  try {
    const r = await fetch(url, { redirect: 'follow' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    if (!text || !text.trim()) throw new Error(
      'Сервер вернул пустой ответ.\n\nЧто сделать:\n' +
      '1. Переразверни скрипт (Развернуть → Новое развёртывание)\n' +
      '2. Запусти backfillFromDay1() вручную\n' +
      '3. Обнови URL и нажми «Загрузить» снова'
    );
    const d = JSON.parse(text);
    loadData(d.data || d);
  } catch(e) { setStatus(''); alert('Ошибка: ' + e.message); }
}

function reloadApi() {
  const url = document.getElementById('apiUrl').value.trim();
  if (url) loadFromApi(); else alert('Введи URL скрипта');
}

// ── ДАННЫЕ ────────────────────────────────────────────────────
function loadData(data) {
  if (!Array.isArray(data) || !data.length) {
    setStatus(''); alert('Данные пустые.'); return;
  }
  allData = data.map(row => ({
    date:   String(row['Дата']     || row['date']   || ''),
    mgr:    String(row['Менеджер'] || row['mgr']    || ''),
    branch: String(row['Филиал']   || row['branch'] || ''),
    chan:    String(row['Канал']    || row['chan']   || ''),
    pkg:    String(row['Пакет']    || row['pkg']    || ''),
    amt:    parseFloat(String(row['Сумма'] || row['amt'] || 0).replace(/[\s ]/g,'')) || 0,
    src:    String(row['Тип']      || row['source'] || ''),
  })).filter(r => r.amt > 0);
  const now = new Date();
  setStatus('Обновлено ' + now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}) + ' · ' + allData.length + ' записей');
  render();
}

function setStatus(t) { document.getElementById('lastUpdate').textContent = t; }

// ── ФИЛЬТР ПЕРИОДА ────────────────────────────────────────────
function setPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function filterByPeriod(data) {
  if (currentPeriod === 'all') return data;
  return data.filter(r => {
    const d = parseInt((r.date || '').slice(0,2)) || 0;
    if (currentPeriod === '1-10')  return d >= 1  && d <= 10;
    if (currentPeriod === '11-20') return d >= 11 && d <= 20;
    if (currentPeriod === '21-')   return d >= 21;
    return true;
  });
}

// ── РЕНДЕР ────────────────────────────────────────────────────
function render() {
  const data   = filterByPeriod(allData);
  const online = data.filter(r => r.chan === 'Онлайн');
  const offN   = data.filter(r => r.chan === 'Оффлайн' && r.branch === 'НСИТИ');
  const offD   = data.filter(r => r.chan === 'Оффлайн' && r.branch === 'ДАМУ');
  const sum    = arr => arr.reduce((s,r) => s+r.amt, 0);
  set('kpiOnline', fmt(sum(online))); set('kpiOnlineN', online.length+' записей');
  set('kpiNsiti',  fmt(sum(offN)));   set('kpiNsitiN',  offN.length+' записей');
  set('kpiDamu',   fmt(sum(offD)));   set('kpiDamuN',   offD.length+' записей');
  set('kpiTotal',  fmt(sum(data)));   set('kpiTotalN',  data.length+' записей');
  renderDaysChart(data); renderChannelsChart(online, offN, offD);
  renderManagersChart(data); renderPackagesChart(data); renderTable(data);
}

function renderDaysChart(data) {
  const byDay = {};
  data.forEach(r => {
    const d = (r.date || '').slice(0,5);
    if (!d || !/^\d{2}\.\d{2}/.test(d)) return;
    if (!byDay[d]) byDay[d] = {online:0,offN:0,offD:0};
    if (r.chan==='Онлайн') byDay[d].online+=r.amt;
    else if (r.branch==='НСИТИ') byDay[d].offN+=r.amt;
    else if (r.branch==='ДАМУ')  byDay[d].offD+=r.amt;
  });
  const labels = Object.keys(byDay).sort();
  buildChart('chartDays','bar',labels,[
    {label:'Онлайн',    data:labels.map(d=>byDay[d].online),backgroundColor:'rgba(168,85,247,.8)', borderColor:'#a855f7',borderWidth:2},
    {label:'Офф НСИТИ', data:labels.map(d=>byDay[d].offN),  backgroundColor:'rgba(236,72,153,.8)',borderColor:'#ec4899',borderWidth:2},
    {label:'Офф ДАМУ',  data:labels.map(d=>byDay[d].offD),  backgroundColor:'rgba(245,158,11,.8)',borderColor:'#f59e0b',borderWidth:2},
  ],{stacked:true});
}

function renderChannelsChart(online, offN, offD) {
  const sum = arr => arr.reduce((s,r)=>s+r.amt,0);
  buildChart('chartChannels','doughnut',['Онлайн','Офф НСИТИ','Офф ДАМУ'],
    [{data:[sum(online),sum(offN),sum(offD)],backgroundColor:['#a855f7','#ec4899','#f59e0b'],borderWidth:0}]);
}

function renderManagersChart(data) {
  const map = {};
  data.forEach(r => { map[r.mgr]=(map[r.mgr]||0)+r.amt; });
  const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]);
  buildChart('chartManagers','bar',sorted.map(x=>x[0]),
    [{label:'Выручка',data:sorted.map(x=>x[1]),backgroundColor:'rgba(168,85,247,.8)',borderColor:'#a855f7',borderWidth:2}],
    {indexAxis:'y'});
}

function renderPackagesChart(data) {
  const map = {};
  data.forEach(r => { const p=(r.pkg||'Прочее').split(' ').slice(0,2).join(' ')||'Прочее'; map[p]=(map[p]||0)+r.amt; });
  const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const colors = ['#a855f7','#ec4899','#f59e0b','#22c55e','#3b82f6','#f97316','#14b8a6','#8b5cf6'];
  buildChart('chartPackages','bar',sorted.map(x=>x[0]),
    [{label:'Выручка',data:sorted.map(x=>x[1]),backgroundColor:colors,borderWidth:0}]);
}

function renderTable(data) {
  const el = document.getElementById('tableContainer');
  if (!data.length) { el.innerHTML='<div class="empty"><div class="ico">📭</div><p>Нет данных за этот период</p></div>'; return; }
  const byDate = {};
  data.forEach(r => { (byDate[r.date]||(byDate[r.date]=[])).push(r); });
  const dates = Object.keys(byDate).sort().reverse();
  let html = '<table class="tbl"><thead><tr><th>Дата</th><th>Менеджер</th><th>Канал</th><th>Филиал</th><th>Пакет</th><th style="text-align:right">Сумма</th></tr></thead><tbody>';
  dates.forEach(d => {
    const rows = byDate[d];
    const tot = rows.reduce((s,r)=>s+r.amt,0);
    html += `<tr style="background:#13132a"><td colspan="5" style="font-weight:700;color:#a855f7">${d}</td><td style="text-align:right;font-weight:700;color:#a855f7">${fmt(tot)}</td></tr>`;
    rows.forEach(r => {
      const cc = r.chan==='Онлайн'?'bon':'boff';
      const bc = r.branch==='НСИТИ'?'bns':'bdm';
      const w  = r.src==='unknown'?' ⚠️':'';
      html += `<tr><td style="color:#6b7280;font-size:12px">──</td><td><b>${r.mgr}</b></td><td><span class="badge ${cc}">${r.chan}</span></td><td><span class="badge ${bc}">${r.branch}</span></td><td>${r.pkg}${w}</td><td style="text-align:right;font-weight:700;color:#ec4899">${fmt(r.amt)}</td></tr>`;
    });
  });
  el.innerHTML = html + '</tbody></table>';
}

function buildChart(id,type,labels,datasets,extra) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  const ctx = document.getElementById(id); if (!ctx) return;
  charts[id] = new Chart(ctx,{type,data:{labels,datasets},options:{
    responsive:true,
    plugins:{legend:{labels:{color:'#9ca3af',font:{size:11}}},tooltip:{callbacks:{label:c=>' '+fmt(c.parsed.y??c.parsed)}}},
    scales: type==='doughnut'?{}:{
      x:{stacked:extra?.stacked,grid:{color:'#1e1e38'},ticks:{color:'#6b7280'}},
      y:{stacked:extra?.stacked,grid:{color:'#1e1e38'},ticks:{color:'#6b7280',callback:v=>fmtShort(v)}},
      ...(extra?.indexAxis==='y'?{x:{grid:{color:'#1e1e38'},ticks:{color:'#6b7280',callback:v=>fmtShort(v)}},y:{grid:{color:'#1e1e38'},ticks:{color:'#9ca3af'}}}:{}),
    },
    indexAxis:extra?.indexAxis,
  }});
}

function fmt(n)     { return Math.round(n||0).toLocaleString('ru-RU')+' тг'; }
function fmtShort(n){ if(n>=1e6)return(n/1e6).toFixed(1)+'М';if(n>=1000)return(n/1000).toFixed(0)+'К';return n; }
function set(id,v)  { const el=document.getElementById(id);if(el)el.textContent=v; }

window.addEventListener('load', () => {
  document.getElementById('apiUrl').value = AUTO_API_URL;
  setStatus('Загрузка данных…');
  loadFromApi();
  setInterval(loadFromApi, 5*60*1000);
});
</script>
</body>
</html>
